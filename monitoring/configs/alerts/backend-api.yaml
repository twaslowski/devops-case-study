apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: backend-api-alerts
  namespace: monitoring
  labels:
    release: kube-prometheus-stack
    app.kubernetes.io/component: alert-rules
    app.kubernetes.io/part-of: backend-api
spec:
  groups:
    - name: backend-api.database.rules
      interval: 1m
      rules:
        - alert: BackendApiHighDbQueryErrorRate
          expr: |
            (
              sum by (namespace) (
                rate(backend_api_db_queries_total{status="error"}[5m])
              )
              /
              sum by (namespace) (
                rate(backend_api_db_queries_total[5m])
              )
            ) > 0.10
          for: 5m
          labels:
            severity: warning
            service: backend-api
            component: database
            namespace: monitoring
          annotations:
            summary: "Backend API DB query error rate is high"
            description: >
              More than 10% of database queries are failing in namespace {{ $labels.namespace }}.
              Current error rate: {{ printf "%.2f" }}%
            runbook_url: https://runbooks.example.com/backend-api/db-error-rate
            dashboard: http://localhost:3000/d/adzmq8f/backend-api?orgId=1&from=now-6h&to=now&timezone=browser&viewPanel=panel-4
        - alert: BackendApiHighHttp500Rate
          expr: |
            (
              sum by (namespace) (
                rate(backend_api_requests_total{status="500"}[5m])
              )
              /
              sum by (namespace) (
                rate(backend_api_requests_total[5m])
              )
            ) > 0.01
          for: 5m

          labels:
            severity: warning
            service: backend-api
            component: http

          annotations:
            summary: "High HTTP 500 error rate on backend API"
            description: >
              More than 1% of HTTP requests are returning 500 errors in namespace {{ $labels.namespace }}.
              Current error rate: {{ printf "%.2f" }}%