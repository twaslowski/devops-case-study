apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: ml-api-alerts
  namespace: monitoring
  labels:
    release: kube-prometheus-stack
    app.kubernetes.io/component: alert-rules
    app.kubernetes.io/part-of: ml-api
spec:
  groups:
    - name: ml-api.rules
      interval: 1m
      rules:
        - alert: MlApiHighHttp500Rate
          expr: |
            (
              sum by (namespace) (
                rate(ml_api_requests_total{status="500"}[5m])
              )
              /
              sum by (namespace) (
                rate(ml_api_requests_total[5m])
              )
            ) > 0.05
          for: 5m

          labels:
            severity: warning
            service: ml-api
            component: http

          annotations:
            summary: "High HTTP 500 error rate on ML API"
            description: >
              More than 5% of HTTP requests are returning 500 errors in namespace {{ $labels.namespace }}.
              Current error rate: {{ printf "%.2f" $value }}%

        - alert: MlApiHighLatency
          expr: |
            histogram_quantile(0.90,
              sum by (le, namespace) (
                rate(ml_api_request_duration_seconds_bucket[5m])
              )
            ) > 1
          for: 5m

          labels:
            severity: warning
            service: ml-api
            component: http

          annotations:
            summary: "High latency on ML API"
            description: >
              p90 latency is above 1s for more than 5 minutes in namespace {{ $labels.namespace }}.
              Current p90 latency: {{ printf "%.2f" $value }}s

        - alert: MlApiSharpDropInRequests
          expr: |
            (
              sum by (namespace) (
                rate(ml_api_requests_total[5m])
              )
              /
              sum by (namespace) (
                rate(ml_api_requests_total[5m] offset 5m)
              )
            ) < 0.5
          for: 2m

          labels:
            severity: critical
            service: ml-api
            component: http

          annotations:
            summary: "Sharp drop in requests to ML API"
            description: >
              More than 50% drop in inbound requests compared to the previous 5 minutes in namespace {{ $labels.namespace }}.
              This could indicate DNS or networking issues.
              Current drop: {{ printf "%.2f" $value }}%

        - alert: MlApiHighMemoryUsage
          expr: |
            (
              ml_api_memory_bytes
              /
              on (namespace, pod) group_left()
              kube_pod_container_resource_limits{resource="memory", unit="byte"}
            ) > 0.80
          for: 5m

          labels:
            severity: warning
            service: ml-api
            component: memory

          annotations:
            summary: "High memory usage on ML API"
            description: >
              Memory usage is more than 80% of memory limit for more than 5 minutes in namespace {{ $labels.namespace }}.
              Current memory usage: {{ printf "%.2f" $value }}%

